<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub 项目收录</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">GH</div>
          <div>
            <h1>GitHub 项目收录</h1>
            <p>github.v2api.top</p>
          </div>
        </div>

        <nav class="category-nav" id="categoryNav" aria-label="项目分类"></nav>

        <div class="sync-panel">
          <div class="sync-row">
            <span>同步模式</span>
            <strong id="syncMode">读取中</strong>
          </div>
          <div class="sync-row">
            <span>项目数量</span>
            <strong id="projectCount">0</strong>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="toolbar">
          <div class="search-box">
            <i data-lucide="search"></i>
            <input id="searchInput" type="search" placeholder="搜索名称、标签、推荐理由" />
          </div>
          <div class="toolbar-actions">
            <button class="icon-button" id="refreshButton" type="button" title="刷新">
              <i data-lucide="refresh-cw"></i>
            </button>
            <button class="primary-button" id="focusFormButton" type="button">
              <i data-lucide="plus"></i>
              <span>收录项目</span>
            </button>
          </div>
        </header>

        <section class="overview" id="overview"></section>

        <section class="project-list" id="projectList" aria-label="项目列表"></section>
      </main>

      <aside class="editor-panel" id="editorPanel">
        <form id="projectForm">
          <div class="panel-title">
            <h2>添加收录</h2>
            <button class="icon-button mobile-close" id="closeFormButton" type="button" title="关闭">
              <i data-lucide="x"></i>
            </button>
          </div>

          <label>
            管理密码
            <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="服务器环境变量 ADMIN_PASSWORD" required />
          </label>

          <label>
            GitHub 链接
            <div class="inline-field">
              <input id="urlInput" name="url" type="url" placeholder="https://github.com/owner/repo" required />
              <button class="icon-button" id="previewButton" type="button" title="读取 GitHub 信息">
                <i data-lucide="sparkles"></i>
              </button>
            </div>
          </label>

          <div class="repo-preview" id="repoPreview">
            <div class="preview-avatar"></div>
            <div>
              <strong>等待读取</strong>
              <p>输入仓库链接后点击星标按钮。</p>
            </div>
          </div>

          <label>
            分类
            <select id="categoryInput" name="category"></select>
          </label>

          <label>
            类型
            <input id="typeInput" name="type" type="text" value="GitHub 项目" />
          </label>

          <label>
            标签
            <input id="tagsInput" name="tags" type="text" placeholder="Claude Code, Agent, Tauri" />
          </label>

          <label>
            推荐理由
            <textarea id="recommendationInput" name="recommendation" rows="4" placeholder="为什么值得收录"></textarea>
          </label>

          <label>
            适合场景
            <textarea id="useCaseInput" name="useCase" rows="3" placeholder="什么情况下会再次用到它"></textarea>
          </label>

          <label>
            备注
            <textarea id="notesInput" name="notes" rows="3" placeholder="版本、风险、合规边界或下载页面"></textarea>
          </label>

          <button class="submit-button" id="submitButton" type="submit">
            <i data-lucide="save"></i>
            <span>保存并同步</span>
          </button>

          <p class="status-line" id="statusLine"></p>
        </form>
      </aside>
    </div>
  </body>
</html>
